pull_request_rules:
  - name: Add needs-dco label when DCO check failed
    conditions:
      - or:
          - base=master
          - base=3.0
          - base‾=2¥.¥d
      - -status-success=DCO
    actions:
      label:
        remove:
          - dco-passed
        add:
          - needs-dco

  - name: Add dco-passed label when DCO check passed
    conditions:
      - or:
          - base=master
          - base=3.0
          - base‾=2¥.¥d
      - status-success=DCO
    actions:
      label:
        remove:
          - needs-dco
        add:
          - dco-passed

  - name: Test passed for CI-required changes
    conditions:
      - or:
        - base=master
        - base=3.0
        - base‾=2¥.¥d
      - 'files‾=^(?!(doc/|benchmark/|examples/|.*¥.md$|(.*/)?OWNERS$|LICENSE$))'
      - "status-success=Build and test"
    actions:
      label:
        add:
          - ci-passed

  - name: Add ci-passed for CI-skipped changes
    conditions:
      - or:
        - base=master
        - base=3.0
        - base‾=2¥.¥d
      - 'files‾=^(doc/|benchmark/|examples/|.*¥.md$|(.*/)?OWNERS$|LICENSE$)'
      - '-files‾=^(?!(doc/|benchmark/|examples/|.*¥.md$|(.*/)?OWNERS$|LICENSE$))'
    actions:
      label:
        add:
          - ci-passed

  - name: Remove ci-passed when required check is not successful
    conditions:
      - or:
        - base=master
        - base=3.0
        - base‾=2¥.¥d
      - 'files‾=^(?!(doc/|benchmark/|examples/|.*¥.md$|(.*/)?OWNERS$|LICENSE$))'
      - "-status-success=Build and test"
    actions:
      label:
        remove:
          - ci-passed
